<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../STYLESHEETS/contact.css">
    <title>Contact</title>
</head>

<body>
    <a href="homepage.html"> <span class="back-text">&#10094;Back to Homepage</span></a>
    <section class="contact-section">
        <div class="contact-container">
            <div class="contact-header">
                <h2>Get in Touch</h2>
                <p>Have a question or a wallpaper suggestion? Drop us a message!👍</p>
            </div>

            <form class="contact-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>

                <div class="input-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message here..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </section>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-logo">
                <a href="homepage.html">
                    <img src="../ASSETS/logo.png" class="nav-logo" alt="Logo"></a>
            </div>
            <ul class="footer-links">
                <li><a href="Privacy%20%26%20Policy.html">Privacy Policy</a></li>
                <li><a href="Terms%20of%20use.html">Terms of Service</a></li>
                <li><a href="../PAGES/About-us.html">Support</a></li>
            </ul>
            <div class="footer-socials">
                <a href="#" title="Visit our Facebook" aria-label="Visit our Facebook"><i
                        class="fab fa-facebook"></i></a>
                <a href="#" title="Visit our Instagram" aria-label="Visit our Instagram"><i
                        class="fab fa-instagram"></i></a>
                <a href="#" title="Visit our Twitter" aria-label="Visit our Twitter"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
        <p class="copyright">&copy; 2026 Capstone project Group10 WallpaperHub. All rights reserved.</p>
    </footer>

</body>

</html>
